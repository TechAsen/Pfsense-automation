---
# Common variables used by terrafrom and ansible for configuring pfsense firewalls
common_args:
  ansible_user: root
  ansible_password: "pfsense"
  ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
  ansible_ssh_private_key_file: '~/.ssh/id_rsa'
  connection_type: 'private'
  vault:
    vault_addr: http://vault.techasen.eu:8200
    secret_paths:
      firewalls: NetOps/pfsense-np
      infra: NetOps/infra-nonprod

###############################
### SOFIA LOCATED FIREWALLS ###
###############################
###!!!
### np-pod01: version 2.7.2 !!!
###!!!
np-pod01:
  firewall_01:
    hostname: np-pod01-v801-firewall01
    wan_ip: 10.1.250.14
    lan_ip: 10.1.33.5
    # pm_node: pve-firewall-np-01
    pm_node: pve
  firewall_02:
    hostname: np-pod01-v801-firewall02
    wan_ip: 10.1.250.15
    lan_ip: 10.1.33.6
    # pm_node: pve-firewall-np-02
    pm_node: pve
  vmnets:
  - { vlan: 1150, net: vtnet0, desc: WAN }
  - { vlan: 1133, net: vtnet1, desc: LAN }
  - { vlan: 1100, net: vtnet2, desc: pfsync }
  - { vlan: 1180, net: vtnet3, desc: MGS }
  vhid:
    wan: 2
    lan: 2
    locals: 2
